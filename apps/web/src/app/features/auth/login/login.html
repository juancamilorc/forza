<div class="login-container">

  <!-- Fondo atleta -->
  <div class="login-bg">
    <img src="athlete-bg.png" alt="" aria-hidden="true" />
    <div class="login-overlay"></div>
  </div>

  <!-- Detalles de luz dorada -->
  <div class="glow glow-bottom-right"></div>
  <div class="glow glow-top-left"></div>

  <!-- Card -->
  <main class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <img src="logo-forza.png" alt="FORZA" class="logo-img" />
      <h1 class="logo-text">FORZA</h1>
      <p class="logo-subtitle">CENTRO DE ENTRENAMIENTO DEPORTIVO</p>
    </div>

    <!-- Formulario -->
    <form class="login-form" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="input-group">
        <input
          class="input-field"
          type="email"
          id="email"
          name="email"
          placeholder="Correo Electrónico"
          [(ngModel)]="email"
          autocomplete="email"
          required
        />
        <label for="email">Correo Electrónico</label>
      </div>

      <!-- Password -->
      <div class="input-group">
        <input
          class="input-field"
          [type]="hidePassword ? 'password' : 'text'"
          id="password"
          name="password"
          placeholder="Contraseña"
          [(ngModel)]="password"
          autocomplete="current-password"
          required
        />
        <label for="password">Contraseña</label>
        <button
          type="button"
          class="toggle-password"
          (click)="hidePassword = !hidePassword"
          [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'"
        >
          <span class="material-symbols-outlined">
            {{ hidePassword ? 'visibility' : 'visibility_off' }}
          </span>
        </button>
      </div>

      <!-- Recordarme y olvidaste -->
      <div class="login-options">
        <label class="remember-me">
          <input
            type="checkbox"
            [(ngModel)]="rememberMe"
            name="rememberMe"
          />
          <span class="checkmark"></span>
          <span class="remember-label">Recordarme</span>
        </label>
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Error -->
      @if (error) {
        <p class="error-message" role="alert">{{ error }}</p>
      }

      <!-- Botón -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="loading || !email || !password"
      >
        @if (loading) {
          <span>Cargando...</span>
        } @else {
          <span>Iniciar Sesión</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        }
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>¿No tienes una cuenta? <a href="#" class="support-link">Contactar Soporte</a></p>
    </div>

  </main>

</div>
