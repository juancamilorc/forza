<div class="shell">

  <!-- Overlay mobile -->
  @if (sidebarOpen()) {
    <div class="sidebar-overlay" (click)="toggleSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">

    <!-- Logo -->
    <div class="sidebar-logo">
      <img src="logo-forza-amarillo.png" alt="FORZA" class="logo-img" />
    </div>

    <!-- Usuario (solo mobile) -->
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">{{ user?.full_name?.charAt(0) }}</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">{{ user?.full_name }}</span>
        <span class="role-badge role-{{ role }}">{{ getRoleBadge() }}</span>
      </div>
      <button class="icon-btn">
        <span class="material-symbols-outlined">notifications</span>
      </button>
    </div>

    <!-- Navegación -->
    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <button
          class="nav-item"
          [class.active]="isActive(item.route)"
          (click)="navigate(item.route)"
        >
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </button>
      }
    </nav>

    <!-- Footer sidebar -->
    <div class="sidebar-footer">
      <button class="nav-item logout" (click)="logout()">
        <span class="material-symbols-outlined">logout</span>
        <span class="nav-label">Cerrar Sesión</span>
      </button>
    </div>

  </aside>

  <!-- Contenido principal -->
  <div class="main-wrapper">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <img src="logo-forza-amarillo.png" alt="FORZA" class="topbar-logo" />
      </div>

      <div class="topbar-right">
        <!-- Desktop: notificaciones + usuario completo -->
        <button class="icon-btn desktop-only">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <div class="user-info desktop-only">
          <div class="user-details">
            <span class="user-name">{{ user?.full_name }}</span>
            <span class="role-badge role-{{ role }}">{{ getRoleBadge() }}</span>
          </div>
          <div class="user-avatar">
            {{ user?.full_name?.charAt(0) }}
          </div>
        </div>

        <!-- Mobile: solo nombre + hamburguesa -->
        <span class="user-name mobile-only">{{ user?.full_name }}</span>
        <button class="hamburger" (click)="toggleSidebar()">
          <span class="material-symbols-outlined">
            {{ sidebarOpen() ? 'close' : 'menu' }}
          </span>
        </button>
      </div>
    </header>

    <!-- Router outlet -->
    <main class="main-content">
      <router-outlet />
    </main>

  </div>

</div>

<app-toast />
